<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTeams - Team Communication</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
        <div class="login-container">
            <div class="logo">
                <i class="fas fa-users"></i>
                <h1>MyTeams</h1>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label for="team-code">Team Code</label>
                    <input type="text" id="team-code" placeholder="Enter your team code" required>
                </div>
                <div class="input-group">
                    <label for="user-name">Your Name</label>
                    <input type="text" id="user-name" placeholder="Enter your name" required>
                </div>
                <button type="submit" class="btn-primary">Join Team</button>
            </form>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="main-screen" class="screen hidden">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <button id="menu-toggle" class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h2>Chat</h2>
                <span id="team-info"></span>
            </div>
            <div class="header-right">
                <button id="meet-btn" class="btn-meet">
                    <i class="fas fa-video"></i>
                    Meet
                </button>
                <div class="user-menu">
                    <button id="user-menu-btn" class="user-avatar">
                        <span id="user-initial"></span>
                    </button>
                    <div id="user-dropdown" class="dropdown hidden">
                        <div class="dropdown-item">
                            <i class="fas fa-circle status-online"></i>
                            <span>Available</span>
                        </div>
                        <div class="dropdown-item" onclick="openSettings()">
                            <i class="fas fa-cog"></i>
                            <span>Settings</span>
                        </div>
                        <div class="dropdown-item" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Sign Out</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="app-body">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search">
                    </div>
                </div>

                <div class="section">
                    <h3>Favorites</h3>
                    <div id="favorites-list" class="user-list">
                        <!-- Favorites will be populated here -->
                    </div>
                </div>

                <div class="section">
                    <h3>Team Members</h3>
                    <div id="users-list" class="user-list">
                        <!-- Users will be populated here -->
                    </div>
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-area">
                <div class="chat-header">
                    <button id="back-btn" class="back-btn">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="chat-user-info">
                        <div class="chat-avatar">
                            <span id="chat-user-initial">T</span>
                        </div>
                        <div class="chat-user-details">
                            <h3 id="chat-user-name">Team Chat</h3>
                            <span id="chat-user-status">Team Channel</span>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="action-btn" onclick="showConversationOptions()">
                            <i class="fas fa-ellipsis-v"></i>
                        </button>
                        <button class="action-btn" onclick="initiateCall('video')">
                            <i class="fas fa-video"></i>
                        </button>
                        <button class="action-btn" onclick="initiateCall('audio')">
                            <i class="fas fa-phone"></i>
                        </button>
                        <button class="action-btn">
                            <i class="fas fa-info-circle"></i>
                        </button>
                    </div>
                    
                    <!-- Conversation Options Dropdown -->
                    <div id="conversation-options" class="conversation-options hidden">
                        <div class="dropdown-item" onclick="deleteEntireConversation()">
                            <i class="fas fa-trash"></i>
                            <span>Delete Conversation</span>
                        </div>
                    </div>
                </div>

                <div id="messages-container" class="messages-container">
                    <!-- Messages will be populated here -->
                </div>

                <div class="message-input-container">
                    <div class="message-input">
                        <button class="input-btn" onclick="toggleEmojiPicker()">
                            <i class="fas fa-smile"></i>
                        </button>
                        <input type="text" id="message-input" placeholder="Type a message">
                        <input type="file" id="file-input" multiple accept=".jpg,.jpeg,.png,.gif,.pdf,.doc,.docx,.txt,.zip" style="display: none;" onchange="handleFileSelect(event)">
                        <button class="input-btn" onclick="document.getElementById('file-input').click()">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <button id="send-btn" class="btn-send">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <div id="emoji-picker" class="emoji-picker hidden">
                        <div class="emoji-grid">
                            😀 😂 😍 😎 😊 😢 😡 😱 🤔 👍 👎 ❤️ 🎉 🔥 💯 🚀
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="close-btn" onclick="closeSettings()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label for="auto-delete-hours">Auto-delete messages after (hours):</label>
                    <input type="number" id="auto-delete-hours" value="2" min="1" max="24">
                    <button onclick="updateAutoDelete()" class="btn-secondary">Update</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Call Modal -->
    <div id="call-modal" class="modal hidden">
        <div class="modal-content call-modal-content">
            <div class="call-info">
                <div class="caller-avatar">
                    <span id="caller-initial"></span>
                </div>
                <h3 id="caller-name">Incoming Call</h3>
                <p id="call-type">Voice Call</p>
            </div>
            <div class="call-actions">
                <button class="btn-decline" onclick="declineCall()">
                    <i class="fas fa-phone-slash"></i>
                </button>
                <button class="btn-accept" onclick="acceptCall()">
                    <i class="fas fa-phone"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
